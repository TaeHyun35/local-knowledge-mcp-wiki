name: harness

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python hooks/preflight_check.py
      - run: python tools/mcp_server/smoke_test.py
      - run: python tools/validate_wiki.py
      - run: python tools/render_viewer_data.py
